name: Preview Analysis

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout triggering branch
        uses: actions/checkout@v4

      - name: Get branch name
        run: |
          BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/\//-/g')
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Save analysis.html
        run: cp analysis.html /tmp/analysis.html

      - name: Checkout main
        run: |
          git fetch origin main
          git checkout main

      - name: Copy file into previews folder
        run: |
          mkdir -p previews
          cp /tmp/analysis.html previews/${{ env.BRANCH }}.html

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previews/${{ env.BRANCH }}.html
          git commit -m "preview: ${{ env.BRANCH }}"
          git push origin main
